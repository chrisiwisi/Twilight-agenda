# This workflow deploys to Firebase Hosting when a commit is pushed to the main branch.
# It was generated by `firebase init hosting:github`.
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build -- --configuration production
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TWILIGHT_AGENDA }}
          channelId: live
          projectId: twilight-agenda
