<p class="lobby-code">Code: <nz-tag nzColor="blue">
    {{ session?.id }}
    <button nz-button nzType="text" (click)="copyCode()">
        <nz-icon [nzType]="copyLabel() === 'Copied!' ? 'check' : 'copy'" nzTheme="outline" />
    </button>
</nz-tag></p>

<app-player-list/>

<p class="waiting">Waiting for players… ({{ players()?.length }} joined)</p>

<button nz-button nzType="default" nzSize="large" nzBlock (click)="takeSpeaker()" [disabled]="sessionService.isSpeaker()">
    I am the speaker
</button>

<button nz-button nzType="primary" nzSize="large" nzBlock (click)="openVoteTypeModal()" [disabled]="!sessionService.isSpeaker()">
    Start Vote
</button>

<nz-modal
    [(nzVisible)]="voteTypeModalVisible"
    nzTitle="Choose Vote Type"
    [nzFooter]="null"
    (nzOnCancel)="voteTypeModalVisible = false">
    <ng-container *nzModalContent>
        <div class="vote-type-options">
            <button nz-button nzBlock nzSize="large" (click)="startVote('binary')">
                <nz-icon nzType="swap" nzTheme="outline" />
                <span class="vote-type-label">Binary</span>
                <span class="vote-type-desc">For or Against</span>
            </button>
            <button nz-button nzBlock nzSize="large" (click)="startVote('player')">
                <nz-icon nzType="team" nzTheme="outline" />
                <span class="vote-type-label">Player</span>
                <span class="vote-type-desc">Vote for a player</span>
            </button>
            <button nz-button nzBlock nzSize="large" (click)="startVote('free')">
                <nz-icon nzType="edit" nzTheme="outline" />
                <span class="vote-type-label">Free</span>
                <span class="vote-type-desc">Enter any choice</span>
            </button>
        </div>
    </ng-container>
</nz-modal>
