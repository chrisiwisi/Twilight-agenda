<div class="landing">
  <h1>Twilight Agenda</h1>
  <p class="username">
    Playing as <strong>{{ username() }}</strong>
    <button nz-button nzType="text" nzShape="circle" (click)="rerollUsername()" title="Reroll username">
      <nz-icon nzType="reload" nzTheme="outline" />
    </button>
    <button nz-button nzType="text" nzShape="circle" (click)="editUsername()" title="Edit username">
        <nz-icon nzType="edit" nzTheme="outline" />
    </button>
  </p>

  <div class="actions">
    <button nz-button nzType="primary" (click)="createLobby()" [nzLoading]="loading()">
      Create Lobby
    </button>
    <button nz-button (click)="toggleJoin()" [disabled]="loading()">Join Lobby</button>
  </div>

  @if (showJoinInput()) {
    <div class="join-form">
      <nz-input-group nzSearch [nzAddOnAfter]="joinBtn">
        <input
          nz-input
          type="text"
          placeholder="Enter lobby code"
          [(ngModel)]="lobbyCode"
          (keydown.enter)="joinLobby()"
          autofocus
        />
      </nz-input-group>
      <ng-template #joinBtn>
        <button nz-button nzType="primary" nzSearch (click)="joinLobby()"
                [nzLoading]="loading()" [disabled]="loading() || !lobbyCode.trim()">
          Join
        </button>
      </ng-template>
    </div>
  }

  @if (errorMessage()) {
    <nz-alert nzType="error" [nzMessage]="errorMessage()" nzShowIcon />
  }
</div>
